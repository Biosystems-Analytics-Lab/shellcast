# Pre-commit configuration for ShellCast project
# Handles both analysis and web environments

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-ast
      - id: check-docstring-first
      - id: requirements-txt-fixer

  # Python linting and formatting via Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        name: ruff (lint + autofix)
        args: ["--fix"]
        files: \.py$
        exclude: ^(analysis/shellcast-analysis/analysisenv/|web/webvenv/|analysis/shellcast-analysis/data/|data_prep/fl/final_outputs/).*$
      - id: ruff-format
        name: ruff (format)
        files: \.py$
        exclude: ^(analysis/shellcast-analysis/analysisenv/|web/webvenv/|analysis/shellcast-analysis/data/|data_prep/fl/final_outputs/).*$

  # JavaScript, CSS, and HTML formatting (Prettier)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(js|jsx|ts|tsx|css|scss|html|htm)$

  # Shell script linting (optional - only if shellcheck is installed)
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        files: \.sh$
        pass_filenames: true
        # Only run if shellcheck is installed
        stages: [manual]
